<!DOCTYPE html>
<html lang="en">

<head>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-C3WTLTZ1Y1"></script>
    <script>

        function gtag() { dataLayer.push(arguments); }
        gtag('js', new Date());
        gtag('config', 'G-C3WTLTZ1Y1');

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self';
        img-src 'self' data:;
        font-src 'self' https://fonts.gstatic.com https://cdnjs.cloudflare.com;
        style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdnjs.cloudflare.com https://unpkg.com;
        script-src 'self' 'unsafe-inline' https://cdn.tailwindcss.com https://cdnjs.cloudflare.com https://unpkg.com https://www.googletagmanager.com https://www.google-analytics.com;
        connect-src 'self' https://www.google-analytics.com https://region1.google-analytics.com https://www.googletagmanager.com;
        frame-ancestors 'self';
        upgrade-insecure-requests">
    <meta http-equiv="Referrer-Policy" content="strict-origin-when-cross-origin">
    <meta http-equiv="Permissions-Policy" content="geolocation=(), microphone=(), camera=()">
    <title>Blogs - MediaKids Academy</title>
    <meta name="description"
        content="Practical teaching guides, ESL classroom ideas, and advice for living and working as a teacher in Thailand.">

    <link rel="icon" type="image/png" sizes="32x32" href="../assets/images/icons/logo.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/aos@next/dist/aos.css" />
    <link rel="stylesheet" href="../css/style.css?v=1.0.2">
    <link rel="stylesheet" href="../css/blog.css?v=202606301636">

    <style>
        .blog-card {
            background: white;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.06);
            transition: all 0.4s cubic-bezier(0.22, 1, 0.36, 1);
        }

        .blog-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.12);
        }

        .blog-card img {
            transition: transform 0.5s ease;
        }

        .blog-card:hover img {
            transform: scale(1.05);
        }

        .category-badge {
            background: linear-gradient(135deg, rgba(59, 130, 246, 0.1), rgba(139, 92, 246, 0.1));
            color: #6366f1;
        }

        .gradient-text {
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
    </style>
    <style>
        /* Lenis Smooth Scroll CSS */
        html.lenis {
            height: auto;
        }

        .lenis.lenis-smooth {
            scroll-behavior: auto;
        }

        .lenis.lenis-smooth [data-lenis-prevent] {
            overscroll-behavior: contain;
        }

        .lenis.lenis-stopped {
            overflow: hidden;
        }

        .lenis.lenis-scrolling iframe {
            pointer-events: none;
        }
    </style>
</head>

<body class="antialiased">

    <div id="shared-header"></div>

    <main class="min-h-screen pb-24">

        <!-- Hero Section -->
        <div class="text-center pt-24 pb-16 px-6" data-aos="fade-down">
            <div
                class="inline-flex items-center gap-3 px-6 py-3 bg-indigo-50 rounded-full text-indigo-600 font-semibold mb-8">
                <i class="fas fa-newspaper"></i>
                <span>Teacher Resources</span>
            </div>

            <h1 class="text-4xl md:text-6xl font-extrabold text-gray-900 mb-6">
                <span class="gradient-text">Blogs</span> & Articles
            </h1>
            <p class="text-lg text-gray-500 max-w-2xl mx-auto leading-relaxed">
                Insights, tips, and stories for teachers in Thailand
            </p>
        </div>

        <div class="blog-filter-bar">
            <div id="blog-category-tabs" class="blog-category-tabs" role="tablist"
                aria-label="Filter articles by category"></div>
            <p id="blog-result-count" class="blog-filter-summary" aria-live="polite"></p>
        </div>

        <!-- Blog Grid -->
        <div class="container mx-auto px-6 max-w-6xl">
            <div id="blog-grid" class="blog-index-grid" aria-live="polite">
                <p class="blog-empty-state">Loading articles...</p>
            </div>

            <!-- Back Link -->
            <div class="text-center mt-16" data-aos="fade-up">
                <a href="../"
                    class="inline-flex items-center gap-2 text-gray-500 hover:text-indigo-600 transition-colors font-medium">
                    <i class="fas fa-arrow-left"></i>
                    <span>Back to Home</span>
                </a>
            </div>
        </div>

    </main>

    <!-- Shared Footer -->
    <div id="shared-footer"></div>
    <!-- Scripts -->
    <!-- Dynamic version loader - ensures cache busting works -->
    <script>document.write('<script src="../js/version.js?v=' + Date.now() + '"><\/script>');</script>
    <script src="https://unpkg.com/aos@next/dist/aos.js"></script>
    <script src="../js/components.js?v=202606151039"></script>
    <script src="../js/script.js?v=1.0.2"></script>
    <script src="../js/blog-index.js?v=202606301636"></script>

    <script>
        AOS.init({ once: true, offset: 50, duration: 800 });
    </script>

    <!-- Lenis Smooth Scroll -->
    <script src="https://unpkg.com/lenis@1.1.13/dist/lenis.min.js"></script>
    <script>
        const lenis = new Lenis({
            lerp: 0.1,
            orientation: 'vertical',
            gestureOrientation: 'vertical',
            smoothWheel: true,
            wheelMultiplier: 1,
            touchMultiplier: 1,
        });
        function raf(time) {
            lenis.raf(time);
            requestAnimationFrame(raf);
        }
        requestAnimationFrame(raf);
    </script>
</body>

</html>
