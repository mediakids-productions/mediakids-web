<html lang="en">

<head>

        function gtag() { dataLayer.push(arguments); }
        gtag('js', new Date());
        gtag('config', 'G-C3WTLTZ1Y1');

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self';
        img-src 'self' data: https://images.unsplash.com https://placehold.co https://drive.google.com https://drive.googleusercontent.com https://lh3.googleusercontent.com https://drive.usercontent.google.com https://*.googleusercontent.com;
        font-src 'self' https://fonts.gstatic.com https://cdnjs.cloudflare.com;
        style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdnjs.cloudflare.com https://unpkg.com;
        script-src 'self' 'unsafe-inline'
          https://cdn.tailwindcss.com
          https://cdnjs.cloudflare.com
          https://unpkg.com
          https://script.google.com
          https://www.googletagmanager.com
          https://www.google-analytics.com;
        connect-src 'self'
          https://script.google.com
          https://script.googleusercontent.com
          https://www.google-analytics.com
          https://region1.google-analytics.com
          https://www.googletagmanager.com;
        form-action 'self' https://script.google.com https://script.googleusercontent.com https://formspree.io;
        frame-ancestors 'self';
        upgrade-insecure-requests">
    <meta http-equiv="Referrer-Policy" content="strict-origin-when-cross-origin">
    <meta http-equiv="Permissions-Policy" content="geolocation=(), microphone=(), camera=()">
    <title>Gallery - MediaKids Academy</title>
    <meta http-equiv="refresh" content="0; url=../gallery/">
    <script>
        window.location.replace('../gallery/' + window.location.search + window.location.hash);
    </script>

    <!-- Favicon -->
    <link rel="icon" type="image/png" sizes="32x32" href="../assets/images/icons/logo.png">
    <link rel="icon" type="image/png" sizes="16x16" href="../assets/images/icons/logo.png">
    <link rel="apple-touch-icon" sizes="180x180" href="../assets/images/icons/logo.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/aos@next/dist/aos.css" />
    <link rel="stylesheet" href="../css/style.css?v=1.0.2">
    <style>
        /* Lenis Smooth Scroll CSS */
        html.lenis {
            height: auto;
        }

        .lenis.lenis-smooth {
            scroll-behavior: auto;
        }

        .lenis.lenis-smooth [data-lenis-prevent] {
            overscroll-behavior: contain;
        }

        .lenis.lenis-stopped {
            overflow: hidden;
        }

        .lenis.lenis-scrolling iframe {
            pointer-events: none;
        }
    </style>
</head>

<body class="leading-relaxed overflow-x-hidden relative">

    <!-- Change 3: Back to Top Button HTML -->
    <button id="back-to-top" aria-label="Back to top">
        <i class="fas fa-chevron-up"></i>
    </button>

    <!-- Header (Updated with ID for scroll logic) -->
    <div id="shared-header"></div>

    <main class="pt-24">
        <section class="py-20 bg-white">
            <div class="container mx-auto px-6 text-center">
                <h1 class="section-title">MediaKids Gallery</h1>
                <p class="section-subtitle">Opening the MediaKids photo gallery.</p>
                <a href="../gallery/" class="btn-primary inline-flex items-center justify-center px-6 py-3 rounded-full nav-page">
                    Open Gallery <i class="fas fa-arrow-right ml-2"></i>
                </a>
            </div>
        </section>
    </main>
    <!-- Shared Footer Container -->
    <div id="shared-footer"></div>

    <!-- Scripts -->
    <!-- Dynamic version loader - ensures cache busting works -->
    <script>document.write('<script src="../js/version.js?v=' + Date.now() + '"><\/script>');</script>
    <script src="https://unpkg.com/aos@next/dist/aos.js"></script>
    <script src="../js/components.js?v=202606151039"></script>
    <script src="../js/script.js?v=1.0.2"></script>

    <!-- Lenis Smooth Scroll -->
    <script src="https://unpkg.com/lenis@1.1.13/dist/lenis.min.js"></script>
    <script>
        const lenis = new Lenis({
            lerp: 0.1,
            orientation: 'vertical',
            gestureOrientation: 'vertical',
            smoothWheel: true,
            wheelMultiplier: 1,
            touchMultiplier: 1,
        });
        function raf(time) {
            lenis.raf(time);
            requestAnimationFrame(raf);
        }
        requestAnimationFrame(raf);
    </script>

</body>

</html>
